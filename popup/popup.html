<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../assets/icon-32.png" alt="Иконка" class="icon">
      <h1>Настройки</h1>
    </header>

    <section class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="extensionEnabled">
        🔌 Расширение включено
      </label>
    </section>

    <section class="setting-group">
      <label for="format">Формат копирования:</label>
      <select id="format">
        <option value="outerHTML">Весь элемент (outerHTML)</option>
        <option value="innerHTML">Только содержимое (innerHTML)</option>
        <option value="attributes">Только атрибуты</option>
        <option value="styles">Названия классов (classList)</option>
      </select>
    </section>

    <section class="setting-group">
      <label>Триггер копирования:</label>
      <label class="radio-label"><input type="radio" name="trigger" value="ctrl"> Ctrl + Click</label>
      <label class="radio-label"><input type="radio" name="trigger" value="alt"> Alt + Click</label>
      <label class="radio-label"><input type="radio" name="trigger" value="shift"> Shift + Click</label>
      <label class="radio-label"><input type="radio" name="trigger" value="none"> Просто клик</label>
    </section>

    <section class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="showToast">
        Показывать уведомление после копирования
      </label>
    </section>

    <section class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="showInfoPanel">
        Показывать панель над элементом при наведении
      </label>
    </section>

    <section class="setting-group">
      <label>Позиция панели:</label>
      <label class="radio-label"><input type="radio" name="panelPosition" value="top"> Сверху</label>
      <label class="radio-label"><input type="radio" name="panelPosition" value="bottom"> Снизу</label>
    </section>

    <div id="status" class="status-message"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
