<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>HTML Copy on Hover</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --accent: #26A4FF;
      --accent-hover: #1a8fe0;
      --border: #e5e7eb;
      --surface: #f9fafb;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 260px;
      padding: 0;
      line-height: 1.4;
    }

    .container { padding: 12px 14px; }

    header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    header .icon { width: 24px; height: 24px; border-radius: 4px; }
    header h1 { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

    .toggle-row { margin-bottom: 4px; }
    .switch-label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #d1d5db; border-radius: 20px; transition: background 0.2s; }
    .slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(16px); }
    .switch-text { font-size: 13px; font-weight: 600; color: var(--text); }

    .divider { height: 1px; background: var(--border); margin: 10px 0; }

    .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .row-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; min-width: 70px; }

    select {
      width: 130px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 12px; font-weight: 500; background: var(--surface); color: var(--text);
      cursor: pointer; outline: none; transition: border-color 0.15s;
    }
    select:hover { border-color: var(--accent); }
    select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15); }

    .trigger-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .trigger-grid.two-col { grid-template-columns: repeat(2, 1fr); }
    .trigger-btn {
      display: flex; align-items: center; justify-content: center; padding: 5px 6px;
      border: 1px solid var(--border); border-radius: 6px; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; background: var(--surface);
      transition: all 0.15s; text-align: center;
    }
    .trigger-btn input { display: none; }
    .trigger-btn:has(input:checked) { background: var(--accent); border-color: var(--accent); color: white; }
    .trigger-btn:hover:not(:has(input:checked)) { border-color: var(--accent); color: var(--accent); }

    .switch-label.small { gap: 0; }

    .status-message { margin-top: 8px; font-size: 11px; text-align: center; min-height: 16px; color: var(--success); font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="../assets/icon-32.png" alt="" class="icon">
      <h1>HTML Copy on Hover</h1>
    </header>

    <div class="toggle-row">
      <label class="switch-label">
        <div class="switch">
          <input type="checkbox" id="extensionEnabled">
          <span class="slider"></span>
        </div>
        <span class="switch-text">Включено</span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="setting-row">
      <span class="row-label">Формат</span>
      <select id="format">
        <option value="outerHTML">outerHTML</option>
        <option value="innerHTML">innerHTML</option>
        <option value="attributes">Атрибуты</option>
        <option value="styles">Классы</option>
      </select>
    </div>

    <div class="setting-row">
      <span class="row-label">Триггер</span>
      <div class="trigger-grid">
        <label class="trigger-btn"><input type="radio" name="trigger" value="ctrl"> Ctrl</label>
        <label class="trigger-btn"><input type="radio" name="trigger" value="alt"> Alt</label>
        <label class="trigger-btn"><input type="radio" name="trigger" value="shift"> Shift</label>
        <label class="trigger-btn"><input type="radio" name="trigger" value="none"> Без</label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="setting-row">
      <span class="row-label">Уведомления</span>
      <label class="switch-label small">
        <div class="switch">
          <input type="checkbox" id="showToast">
          <span class="slider"></span>
        </div>
      </label>
    </div>

    <div class="setting-row">
      <span class="row-label">Инфо-панель</span>
      <label class="switch-label small">
        <div class="switch">
          <input type="checkbox" id="showInfoPanel">
          <span class="slider"></span>
        </div>
      </label>
    </div>

    <div class="setting-row">
      <span class="row-label">Позиция</span>
      <div class="trigger-grid two-col">
        <label class="trigger-btn"><input type="radio" name="panelPosition" value="top"> ↕ Сверху</label>
        <label class="trigger-btn"><input type="radio" name="panelPosition" value="bottom"> ↕ Снизу</label>
      </div>
    </div>

    <div id="status" class="status-message"></div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
